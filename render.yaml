services:
  # 1. Express Backend Web Service
  - type: web
    name: diabetes-tracker-backend
    env: node
    plan: free
    buildCommand: "npm install && npm run db:postgres && cd server && npm install && npx prisma db push && npm run build"
    startCommand: "cd server && npm start"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # 2. Frontend React 19 Static Site
  - type: web
    name: diabetes-tracker-frontend
    env: static
    buildCommand: "cd client && npm install --legacy-peer-deps && npm run build"
    staticPublishPath: "client/dist"
    headers:
      - path: "/*"
        name: "Cache-Control"
        value: "public, max-age=0, must-revalidate"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
