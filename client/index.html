<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩸</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diabetes Health Tracker</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Tamil:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      // Programmatic version check to bust aggressive mobile/PWA WebAPK caches
      const APP_VERSION = 'v3';
      const lastVersion = localStorage.getItem('app_version');
      if (lastVersion !== APP_VERSION) {
        console.log('New version detected! Purging aggressive mobile PWA caches...');
        if ('caches' in window) {
          caches.keys().then(names => {
            return Promise.all(names.map(name => caches.delete(name)));
          }).then(() => {
            console.log('Caches successfully deleted!');
            localStorage.setItem('app_version', APP_VERSION);
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                  registration.unregister();
                }
                window.location.reload();
              });
            } else {
              window.location.reload();
            }
          }).catch(err => {
            console.error('Failed to clear caches:', err);
            localStorage.setItem('app_version', APP_VERSION);
            window.location.reload();
          });
        } else {
          localStorage.setItem('app_version', APP_VERSION);
        }
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=3')
            .then(reg => {
              console.log('PWA Service Worker registered!', reg);
              // Trigger reload if a new service worker is installed
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('New update installed, reloading page...');
                      window.location.reload();
                    }
                  };
                }
              };
            })
            .catch(err => console.log('PWA Service Worker registration failed:', err));
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 transition-colors duration-200">
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background-color: #f8fafc;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
          color: #1e293b;
          transition: background-color 0.2s;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loader {
            background-color: #0b1329;
            color: #f1f5f9;
          }
        }
        .spinner {
          width: 48px;
          height: 48px;
          border: 4px solid #10b981;
          border-top-color: transparent;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin-bottom: 24px;
        }
        .loader-title {
          font-size: 1.25rem;
          font-weight: 800;
          letter-spacing: -0.025em;
          margin-bottom: 8px;
        }
        .loader-sub {
          font-size: 0.875rem;
          font-weight: 500;
          opacity: 0.7;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="loader-title">Amma Health Tracker</div>
        <div class="loader-sub">Loading Health Dashboard...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
